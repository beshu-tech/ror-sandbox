readonlyrest:

  global_settings:
    prompt_for_basic_auth: true

  audit:
    enabled: true
    outputs: [index]

  ssl:
    enable: true
    # certbot
#    server_certificate_file: "certs-certbot/live/my-domain.com/fullchain.pem"
#    server_certificate_key_file: "certs-certbot/live/my-domain.com/privkey.pem"

    # dehydrated
    server_certificate_file: "certs-dehydrated/my-domain.com/fullchain.pem"
#    server_certificate_key_file: "certs-dehydrated/my-domain.com/privkey.pem"
    server_certificate_key_file: "certs-dehydrated/my-domain.com/privkey-pkcs8.pem"

  access_control_rules:

    - name: "Admins"
      groups: [Administrators]

    - name: "End users"
      groups: ["EndUsers"]
      indices: ["*-frontend-*", "kibana_sample_data_*"]

    - name: "Business users"
      groups: ["BusinessUsers"]
      indices: ["*-business-*", "kibana_sample_data_*"]

  users:
    - username: admin
      auth_key: admin:admin
      groups:
        - id: "Administrators"
          name: "Administrators"
        - id: "EndUsers"
          name: "End Users"
        - id: "BusinessUsers"
          name: "Business Users"

    - username: user1
      auth_key: user1:test
      groups:
        - id: "EndUsers"
          name: "End Users"
        - id: "BusinessUsers"
          name: "Business Users"

    - username: user2
      auth_key: user2:test
      groups:
        - id: "EndUsers"
          name: "End Users"

