readonlyrest:

  audit:
    enabled: true
    outputs: [index]

  access_control_rules:

    - name: "KIBANA"
      type: allow
      auth_key: kibana:kibana
      verbosity: error

    - name: "admin"
      type: allow
      groups: ["admin"]
      kibana:
        access: unrestricted
        index: .kibana_admin

    - name: "Group1 users"
      type: allow
      groups_or: ["g1"]
      kibana:
        access: rw
        index: .kibana_g1

    - name: "Group2 users"
      type: allow
      groups_or: ["g2"]
      kibana:
        access: rw
        index: .kibana_g2

    - name: "NO tenancy user"
      type: allow
      auth_key: user3:test
      kibana:
        access: rw
        # default kibana index

  users:
    - username: admin
      auth_key: admin:admin
      groups: [admin]

    - username: user1
      auth_key: user1:test
      groups: [g1, g2]

    - username: user2
      auth_key: user2:test
      groups: [g1]